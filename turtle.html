<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сүйкімді Тасбақа Ойыны</title>
    <style>
        :root { --main-bg: #f0f9ff; --turtle-body: #83d34a; --turtle-dark: #5ba32d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: var(--main-bg); height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        #menu-screen, #game-screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        #game-screen { display: none; background: radial-gradient(circle, #ffffff 0%, #e0f2f1 100%); }
        .header { width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; }
        .score-box { background: white; padding: 10px 25px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 22px; font-weight: bold; }
        .home-btn { font-size: 35px; cursor: pointer; border: none; background: none; }
        .lvl-list { display: flex; gap: 20px; margin: 30px 0; }
        .lvl-card { 
            width: 80px; height: 80px; background: white; border-radius: 20px; border: 3px solid #4caf50;
            display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; position: relative;
        }
        .lvl-card.locked { background: #eee; border-color: #bbb; color: #999; cursor: not-allowed; }
        .lvl-card.locked::after { content: '🔒'; position: absolute; top: -10px; right: -10px; font-size: 18px; }
        .game-area { position: relative; width: 100%; max-width: 500px; height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sample-card { 
            position: absolute; top: 80px; right: 10px; width: 160px; height: 160px; 
            background: white; border: 4px solid #ff9800; border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 10; padding: 5px;
        }
        .turtle-svg { width: 340px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .stone-box { 
            width: 90%; background: rgba(255,255,255,0.8); border-radius: 25px; padding: 15px;
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 30px;
            border: 2px dashed #4caf50; min-height: 80px;
        }
        .drag-stone { width: 60px; height: 60px; cursor: move; touch-action: none; z-index: 1000; position: relative; }
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal-body {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 30px; text-align: center; width: 85%; max-width: 350px;
        }
        .btn-next { background: #4caf50; color: white; border: none; padding: 12px 35px; border-radius: 50px; font-size: 20px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 style="color: #2e7d32; font-size: 36px;">Сүйкімді Тасбақа</h1>
        <div class="lvl-list">
            <div class="lvl-card" onclick="loadLevel(1)">1</div>
            <div class="lvl-card locked" id="lock2" onclick="loadLevel(2)">2</div>
            <div class="lvl-card locked" id="lock3" onclick="loadLevel(3)">3</div>
        </div>
        <button class="btn-next" onclick="loadLevel(unlockedLvl)">Бастау</button>
    </div>

    <div id="game-screen">
        <div class="header">
            <button class="home-btn" onclick="goHome()">🏡</button>
            <div class="score-box">Ұпай: <span id="score">0</span> / 30</div>
            <div style="width:40px"></div>
        </div>
        <div class="game-area">
            <div class="sample-card" id="sample"></div>
            <svg viewBox="0 0 200 220" class="turtle-svg">
                <ellipse cx="60" cy="175" rx="25" ry="15" fill="#83d34a"/><ellipse cx="140" cy="175" rx="25" ry="15" fill="#83d34a"/>
                <ellipse cx="50" cy="120" rx="20" ry="12" fill="#83d34a"/><ellipse cx="150" cy="120" rx="20" ry="12" fill="#83d34a"/>
                <g transform="translate(100,55)">
                    <path d="M-30,0 A30,35 0 1,1 30,0 A30,45 0 1,1 -30,0" fill="#83d34a"/>
                    <circle cx="-12" cy="-10" r="7" fill="white"/><circle cx="-10" cy="-11" r="3" fill="black"/>
                    <circle cx="12" cy="-10" r="7" fill="white"/><circle cx="14" cy="-11" r="3" fill="black"/>
                    <path d="M-10,12 Q0,20 10,12" fill="none" stroke="#5ba32d" stroke-width="2" stroke-linecap="round"/>
                </g>
                <circle cx="100" cy="135" r="75" fill="#5ba32d" stroke="#3e7d1d" stroke-width="4"/>
                <g id="slots"></g>
            </svg>
            <div class="stone-box" id="bank"></div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-body">
            <h2 id="modal-title">Жарайсың! 👍</h2>
            <p id="modal-desc"></p>
            <button class="btn-next" onclick="closeModal()">Келесі кезең</button>
        </div>
    </div>

    <script>
        let score = 0, currentLvl = 1, unlockedLvl = 1, progress = 0;
        const colors = ["#FF5252", "#2196F3", "#FFEB3B", "#9C27B0", "#FF9800", "#00BCD4", "#4CAF50"];
        const hexPos = [{x:100,y:135},{x:100,y:98},{x:132,y:116},{x:132,y:154},{x:100,y:172},{x:68,y:154},{x:68,y:116}];
        const sounds = {
            level1: new Audio("https://actions.google.com/sounds/v1/foley/firework_rocket_explode.ogg"),
            level2: new Audio("https://actions.google.com/sounds/v1/human_voices/applause_clapping.ogg"),
            level3: new Audio("https://cdn.pixabay.com/download/audio/2022/03/24/audio_903061c65d.mp3")
        };

        function goHome() {
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
            if(unlockedLvl>=2) document.getElementById('lock2').classList.remove('locked');
            if(unlockedLvl>=3) document.getElementById('lock3').classList.remove('locked');
        }

        function loadLevel(l) {
            if(l > unlockedLvl) return;
            currentLvl = l; progress = 0;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            drawGame();
        }

        function drawHex(c, s) { return `<polygon points="0,-${s} ${s*0.87},-${s/2} ${s*0.87},${s/2} 0,${s} -${s*0.87},${s/2} -${s*0.87},-${s/2}" fill="${c}" />`; }

        function drawGame() {
            const slots = document.getElementById('slots');
            const bank = document.getElementById('bank');
            const sample = document.getElementById('sample');
            slots.innerHTML = bank.innerHTML = '';
            let count = currentLvl === 1 ? 3 : (currentLvl === 2 ? 5 : 7);
            let goalColors = colors.slice(0, count).sort(() => Math.random() - 0.5);
            let positions = hexPos.slice(0, count);
            let sampleSVG = `<svg viewBox="50 80 100 100" width="100%" height="100%"><circle cx="100" cy="135" r="45" fill="#5ba32d"/>`;
            positions.forEach((p, i) => {
                slots.innerHTML += `<g transform="translate(${p.x},${p.y})" class="slot" data-color="${goalColors[i]}"><polygon points="0,-18 15.5,-9 15.5,9 0,18 -15.5,9 -15.5,-9" fill="white" stroke="#3e7d1d" stroke-width="1" /></g>`;
                sampleSVG += `<g transform="translate(${p.x},${p.y})">${drawHex(goalColors[i], 8)}</g>`;
            });
            sample.innerHTML = sampleSVG + `</svg>`;
            let shuffle = [...goalColors].sort(() => Math.random() - 0.5);
            shuffle.forEach(c => {
                const el = document.createElement('div');
                el.className = 'drag-stone';
                el.innerHTML = `<svg viewBox="-20 -20 40 40">${drawHex(c, 25)}</svg>`;
                el.dataset.color = c;
                bank.appendChild(el);
                addDrag(el);
            });
        }

        function addDrag(el) {
            let active = false, sx, sy, rect;
            const start = e => {
                active = true;
                rect = el.getBoundingClientRect();
                const t = e.type.includes('touch') ? e.touches[0] : e;
                sx = t.clientX - rect.left; sy = t.clientY - rect.top;
                el.style.position = 'fixed';
                el.style.zIndex = 1000;
                document.addEventListener('mousemove', move);
                document.addEventListener('touchmove', move, {passive:false});
                document.addEventListener('mouseup', end);
                document.addEventListener('touchend', end);
            };
            const move = e => {
                if(!active) return;
                e.preventDefault();
                const t = e.type.includes('touch') ? e.touches[0] : e;
                el.style.left = (t.clientX - sx) + 'px';
                el.style.top = (t.clientY - sy) + 'px';
            };
            const end = e => {
                active = false;
                const r = el.getBoundingClientRect();
                const cx = r.left + r.width/2, cy = r.top + r.height/2;
                let found = null;
                document.querySelectorAll('.slot').forEach(s => {
                    const sr = s.getBoundingClientRect();
                    if(cx > sr.left && cx < sr.right && cy > sr.top && cy < sr.bottom) {
                        if(s.dataset.color === el.dataset.color) found = s;
                    }
                });
                if(found) {
                    found.querySelector('polygon').setAttribute('fill', el.dataset.color);
                    el.remove(); progress++;
                    if(progress === (currentLvl === 1 ? 3 : (currentLvl === 2 ? 5 : 7))) win();
                } else { el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; }
                document.removeEventListener('mousemove', move);
                document.removeEventListener('touchmove', move);
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
        }

        function win() {
            score += 10;
            document.getElementById('score').innerText = score;
            if(currentLvl === 1) sounds.level1.play();
            else if(currentLvl === 2) sounds.level2.play();
            else if(currentLvl === 3) sounds.level3.play();
            setTimeout(() => {
                const m = document.getElementById('modal');
                if(currentLvl === 3) {
                    document.getElementById('modal-title').innerText = "КЕРЕМЕТ! 👏";
                    document.getElementById('modal-desc').innerText = "Сен барлық ұпайды жинадың!";
                } else {
                    document.getElementById('modal-title').innerText = "Жарайсың! 👍";
                    document.getElementById('modal-desc').innerText = "Келесі деңгей ашылды!";
                    if(unlockedLvl === currentLvl) unlockedLvl++;
                }
                m.style.display = 'block';
            }, 500);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if(currentLvl < 3) loadLevel(currentLvl + 1); else goHome();
        }
    </script>
</body>
</html>
