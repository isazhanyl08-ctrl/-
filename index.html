<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Жеміс Жәшіктері - Барлық құрылғыға</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(180deg, #CEF4FC 0%, #C8E6C9 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif; height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        .header-info { display: flex; justify-content: space-around; width: 100%; padding: 10px; background: rgba(255, 255, 255, 0.6); }
        .stat-box { font-size: 18px; font-weight: bold; color: #2C5F2D; }
        h1 { font-size: 20px; color: #2C5F2D; margin: 10px 0; text-align: center; }
        #fruit-storage { display: flex; justify-content: center; gap: 10px; height: 100px; margin-top: 10px; width: 100%; }
        .fruit { font-size: 50px; cursor: grab; transition: transform 0.1s; z-index: 100; touch-action: none; user-select: none; }
        #basket-area { display: flex; gap: 15px; margin-top: auto; margin-bottom: 20px; padding: 0 10px; }
        .basket-wrapper { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .crate {
            width: 100%; height: 100px; background-color: #D79956; border: 3px solid #A67038;
            border-radius: 10px; position: relative; display: flex; flex-wrap: wrap;
            align-content: center; justify-content: center; transition: all 0.3s;
        }
        .crate-cloth { position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; opacity: 0.5; pointer-events: none; }
        .red .crate-cloth { background-color: #EF5350; }
        .yellow .crate-cloth { background-color: #FFEE58; }
        .green .crate-cloth { background-color: #66BB6A; }
        .basket-label { margin-top: 5px; padding: 2px 8px; border-radius: 10px; color: white; font-size: 12px; font-weight: bold; text-align: center;}
        .label-red { background: #E53935; }
        .label-yellow { background: #FBC02D; color: #333; }
        .label-green { background: #4CAF50; }
        .basket .fruit { font-size: 30px; margin: 2px; }
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.3); z-index: 1000; width: 80%;
        }
        button { padding: 10px 20px; font-size: 18px; background: #FF9800; color: white; border: none; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header-info">
        <div class="stat-box">Деңгей: <span id="level-num">1</span></div>
        <div class="stat-box">Ұпай: <span id="score-num">0</span></div>
    </div>
    <h1>Жемістерді сәйкестендір</h1>
    <div id="fruit-storage"></div>
    <div id="basket-area">
        <div class="basket-wrapper" id="w-red"><div class="basket crate red" data-color="red"><div class="crate-cloth"></div></div><div class="basket-label label-red">Қызыл</div></div>
        <div class="basket-wrapper" id="w-yellow"><div class="basket crate yellow" data-color="yellow"><div class="crate-cloth"></div></div><div class="basket-label label-yellow">Сары</div></div>
        <div class="basket-wrapper" id="w-green"><div class="basket crate green" data-color="green"><div class="crate-cloth"></div></div><div class="basket-label label-green">Жасыл</div></div>
    </div>
    <div id="modal"><h2 id="modal-text"></h2><p id="modal-score-info"></p><button onclick="nextAction()" id="modal-btn"></button></div>

    <script>
        let currentLevel = 1, totalScore = 0, levelCorrect = 0, fruitsInLevel = 0;
        const storage = document.getElementById('fruit-storage'), modal = document.getElementById('modal');

        function initLevel() {
            storage.innerHTML = ''; levelCorrect = 0;
            document.querySelectorAll('.basket').forEach(b => { b.querySelectorAll('.fruit').forEach(f => f.remove()); });
            let currentFruits = [];
            const greenW = document.getElementById('w-green');

            if (currentLevel === 1) {
                fruitsInLevel = 4;
                currentFruits.push({img:'🍎',c:'red'},{img:'🍓',c:'red'},{img:'🍌',c:'yellow'},{img:'🍋',c:'yellow'});
                greenW.style.visibility = 'hidden';
            } else if (currentLevel === 2) {
                fruitsInLevel = 6;
                currentFruits.push({img:'🍎',c:'red'},{img:'🍒',c:'red'},{img:'🍌',c:'yellow'},{img:'🍍',c:'yellow'},{img:'🍏',c:'green'},{img:'🥝',c:'green'});
                greenW.style.visibility = 'visible';
            } else {
                fruitsInLevel = 9;
                currentFruits.push({img:'🍎',c:'red'},{img:'🍓',c:'red'},{img:'🍒',c:'red'},{img:'🍌',c:'yellow'},{img:'🍍',c:'yellow'},{img:'🍋',c:'yellow'},{img:'🍏',c:'green'},{img:'🥝',c:'green'},{img:'🥦',c:'green'});
                greenW.style.visibility = 'visible';
            }

            currentFruits.sort(() => Math.random() - 0.5).forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'fruit'; div.innerText = f.img; div.dataset.color = f.c;
                makeDraggable(div);
                storage.appendChild(div);
            });
            document.getElementById('level-num').innerText = currentLevel;
        }

        function makeDraggable(el) {
            let startX, startY, initialX, initialY;
            
            // ТЫШҚАНМЕН (Компьютер)
            el.onmousedown = dragMouseDown;
            // САУСАҚПЕН (Телефон)
            el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                let clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                initialX = el.offsetLeft; initialY = el.offsetTop;
                startX = clientX; startY = clientY;
                document.onmouseup = closeDragElement; document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag; document.ontouchmove = elementDrag;
                el.style.position = 'absolute'; el.style.zIndex = 1000;
            }

            function elementDrag(e) {
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                el.style.left = (el.offsetLeft - (startX - clientX)) + "px";
                el.style.top = (el.offsetTop - (startY - clientY)) + "px";
                startX = clientX; startY = clientY;
            }

            function closeDragElement(e) {
                document.onmouseup = null; document.ontouchend = null;
                document.onmousemove = null; document.ontouchmove = null;
                
                const baskets = document.querySelectorAll('.basket');
                let dropped = false;
                const rect = el.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                baskets.forEach(b => {
                    const bRect = b.getBoundingClientRect();
                    if (centerX > bRect.left && centerX < bRect.right && centerY > bRect.top && centerY < bRect.bottom) {
                        if (el.dataset.color === b.dataset.color) {
                            b.appendChild(el); el.style.position = 'static'; el.style.fontSize = '30px';
                            el.onmousedown = null; el.ontouchstart = null;
                            levelCorrect++; dropped = true; checkWin();
                        }
                    }
                });

                if (!dropped) {
                    el.style.position = 'static'; el.style.left = ''; el.style.top = '';
                }
            }
        }

        function checkWin() {
            if (levelCorrect === fruitsInLevel) {
                if (currentLevel === 1) { totalScore += 5; showModal("Өте жақсы орындау!", "5 балл", "2-кезеңге өту"); }
                else if (currentLevel === 2) { totalScore += 10; showModal("Тамаша 👍", "10 балл", "3-кезеңге өту"); }
                else { totalScore += 15; showModal("Жарайсың, балақай🤩", "15 балл<br>Барлық балды жинадың! 💕"); document.getElementById('modal-btn').innerText = "Қайта бастау"; }
                document.getElementById('score-num').innerText = totalScore;
            }
        }

        function showModal(t, s, b) {
            document.getElementById('modal-text').innerText = t;
            document.getElementById('modal-score-info').innerHTML = s;
            document.getElementById('modal-btn').innerText = b || "Жалғастыру";
            modal.style.display = 'block';
        }

        function nextAction() {
            modal.style.display = 'none';
            if (currentLevel < 3) currentLevel++; else { currentLevel = 1; totalScore = 0; document.getElementById('score-num').innerText = 0; }
            initLevel();
        }

        initLevel();
    </script>
</body>
</html>
